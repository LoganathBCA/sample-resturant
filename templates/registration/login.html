<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login — Spice &amp; Sizzle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --terracotta: #8A3E2C;
            --copper: #BD6C34;
            --gold: #FFD980;
            --crimson: #8E1A22;
            --dark: #1a0e09;
            --dark-card: #2a1610;
            --dark-surface: #1e120d;
            --cream: #FFF8EE;
            --text-light: #f5ece3;
            --text-muted: #c4a98d;
            --font-heading: 'Playfair Display', Georgia, serif;
            --font-body: 'Poppins', 'Segoe UI', sans-serif;
            --radius: 16px;
            --radius-sm: 10px;
            --transition: .35s cubic-bezier(.4, 0, .2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,217,128,.1) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 70%, rgba(189,108,52,.08) 0%, transparent 100%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--dark-card);
            border: 1px solid rgba(255,217,128,.1);
            border-radius: var(--radius);
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
        }

        .login-logo {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-logo .logo-spice { color: var(--gold); }
        .login-logo .logo-amp { color: var(--copper); font-style: italic; margin: 0 3px; }
        .login-logo .logo-sizzle { color: var(--crimson); }

        .login-subtitle {
            color: var(--text-muted);
            font-size: .85rem;
            margin-bottom: 36px;
            letter-spacing: .5px;
        }

        .login-form { text-align: left; }

        .login-field {
            margin-bottom: 20px;
        }

        .login-field label {
            display: block;
            font-size: .8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .login-field input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(26,14,9,.6);
            border: 1px solid rgba(255,217,128,.12);
            border-radius: var(--radius-sm);
            color: var(--cream);
            font-family: var(--font-body);
            font-size: .95rem;
            transition: var(--transition);
            outline: none;
        }

        .login-field input:focus {
            border-color: var(--copper);
            box-shadow: 0 0 0 3px rgba(189,108,52,.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--crimson), var(--terracotta));
            color: var(--cream);
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(142,26,34,.3);
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(142,26,34,.45);
        }

        .login-errors {
            background: rgba(142,26,34,.2);
            border: 1px solid rgba(142,26,34,.3);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: .85rem;
            color: #ef9a9a;
        }

        .login-back {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: .82rem;
            text-decoration: none;
            transition: color .3s;
        }
        .login-back:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">
            <span class="logo-spice">Spice</span><span class="logo-amp">&amp;</span><span class="logo-sizzle">Sizzle</span>
        </div>
        <p class="login-subtitle">Staff Dashboard Login</p>

        {% if form.errors %}
        <div class="login-errors">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="login-field">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autofocus required placeholder="Enter username">
            </div>
            <div class="login-field">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required placeholder="Enter password">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <a href="/" class="login-back">← Back to Storefront</a>
    </div>

</body>
</html>
